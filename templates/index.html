<!DOCTYPE html>
<html>
<head>
    <title>Dairy Farm Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Dairy Farm Chatbot</h1>

        <form method="POST">

            <input
                type="text"
                name="user_input"
                placeholder="Ask a question..."
                required>

            <button type="submit">
                Send
            </button>

        </form>

        {% if reply %}
            <div class="reply">
                <h3>Bot Reply:</h3>
                <p>{{ reply }}</p>
            </div>
        {% endif %}

    </div>

</body>
</html>
